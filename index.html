<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>3D Survival Game</title>

<style>
body { margin: 0; overflow: hidden; background: black; font-family: Arial; }

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: white;
}

#minimap {
  position: absolute;
  bottom: 10px;
  right: 10px;
  width: 150px;
  height: 150px;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
}

#shop {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: black;
  color: white;
  padding: 20px;
  display: none;
}
</style>
</head>

<body>

<div id="ui">
  Scrap: <span id="scrap">0</span><br>
  Money: <span id="money">0</span> CZK<br>
  HP: <span id="hp">100</span>
</div>

<canvas id="minimap"></canvas>

<div id="shop">
  <h2>Shop</h2>
  <button onclick="buyBackpack()">Backpack (500 CZK)</button><br><br>
  <button onclick="heal()">Heal (200 CZK)</button><br><br>
  <button onclick="buySpeed()">Speed (300 CZK)</button><br><br>
  <button onclick="closeShop()">Close</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/controls/PointerLockControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/loaders/GLTFLoader.js"></script>

<script>
// SCÉNA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.03);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// OVLÁDÁNÍ
const controls = new THREE.PointerLockControls(camera, document.body);
document.body.onclick = () => controls.lock();
scene.add(controls.getObject());

camera.position.y = 1.7;

// SVĚTLO
const light = new THREE.DirectionalLight(0xaaaaee, 0.5);
light.position.set(50,100,50);
scene.add(light);

// ZEM
const texture = new THREE.TextureLoader().load("podlaha.jpg");
texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
texture.repeat.set(50,50);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(300,300),
  new THREE.MeshStandardMaterial({ map: texture })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// HRÁČ
let player = {
  speed: 0.1,
  scrap: 0,
  money: 0,
  hp: 100,
  capacity: 50
};

// POHYB
let keys = {};
document.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;

  if (e.key === "e") {
    collectScrap();

    if (isNearShop()) openShop();
  }
});

document.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
});

// 3D DOMY
const loader = new THREE.GLTFLoader();
let buildings = [];

function createHouse(x, z) {
  loader.load("models/Cyprys_House.glb", (gltf) => {
    const house = gltf.scene;

    house.position.set(x, 0, z);
    house.scale.set(2,2,2);
    scene.add(house);

    // kolize
    const box = new THREE.Mesh(
      new THREE.BoxGeometry(10,8,10),
      new THREE.MeshBasicMaterial({ visible:false })
    );

    box.position.set(x,4,z);
    scene.add(box);
    buildings.push(box);

    // světlo
    const light = new THREE.PointLight(0xffeeaa, 0.4, 10);
    light.position.set(x,3,z);
    scene.add(light);
  });
}

// GENEROVÁNÍ DOMŮ
for(let i=0;i<25;i++){
  const x = (Math.random()-0.5)*280;
  const z = (Math.random()-0.5)*280;
  createHouse(x,z);
}

// SHOP BUDOVA
let shopBuilding = new THREE.Mesh(
  new THREE.BoxGeometry(10,6,10),
  new THREE.MeshStandardMaterial({ color: 0x00ff00 })
);
shopBuilding.position.set(0,3,0);
scene.add(shopBuilding);

const shopLight = new THREE.PointLight(0x00ff00, 2, 20);
shopLight.position.set(0,6,0);
scene.add(shopLight);

function isNearShop(){
  return camera.position.distanceTo(shopBuilding.position) < 8;
}

// SCRAP
let scraps = [];
for(let i=0;i<50;i++){
  const s = new THREE.Mesh(
    new THREE.CylinderGeometry(0.5,0.5,1,8),
    new THREE.MeshBasicMaterial({ color: 0xffd700 })
  );

  s.position.set(
    (Math.random()-0.5)*280,
    0.5,
    (Math.random()-0.5)*280
  );

  scene.add(s);
  scraps.push(s);
}

function collectScrap(){
  scraps.forEach((s,i)=>{
    if(s.position.distanceTo(camera.position)<3){
      if(player.scrap < player.capacity){
        player.scrap++;
        player.money += Math.floor(Math.random()*6)+15;

        scene.remove(s);
        scraps.splice(i,1);
      }
    }
  });
}

// POLICIE (zpomalena)
let police = [];
for(let i=0;i<3;i++){
  const p = new THREE.Mesh(
    new THREE.BoxGeometry(2,3,2),
    new THREE.MeshBasicMaterial({ color: 0x0000ff })
  );

  p.position.set(
    (Math.random()-0.5)*200,
    1.5,
    (Math.random()-0.5)*200
  );

  scene.add(p);
  police.push(p);
}

// SHOP
function openShop(){
  document.getElementById("shop").style.display="block";
}
function closeShop(){
  document.getElementById("shop").style.display="none";
}

function buyBackpack(){
  if(player.money >= 500){
    player.money -= 500;
    player.capacity = 100;
  }
}
function heal(){
  if(player.money >= 200){
    player.money -= 200;
    player.hp = Math.min(100, player.hp+30);
  }
}
function buySpeed(){
  if(player.money >= 300){
    player.money -= 300;
    player.speed += 0.05;
  }
}

// MINIMAPA
const minimap = document.getElementById("minimap");
const ctx = minimap.getContext("2d");

// UPDATE
function update(){

  let dir = new THREE.Vector3();

  if(keys["w"]) dir.z -= 1;
  if(keys["s"]) dir.z += 1;
  if(keys["a"]) dir.x -= 1;
  if(keys["d"]) dir.x += 1;

  dir.normalize();

  controls.moveRight(dir.x * player.speed);
  controls.moveForward(dir.z * player.speed);

  // hranice
  camera.position.x = Math.max(-150, Math.min(150, camera.position.x));
  camera.position.z = Math.max(-150, Math.min(150, camera.position.z));

  // policie AI (pomalejší)
  police.forEach(p=>{
    let dist = p.position.distanceTo(camera.position);

    if(dist < 100){
      let dir = camera.position.clone().sub(p.position).normalize();
      p.position.add(dir.multiplyScalar(0.02)); // zpomaleno
    }

    if(dist < 2){
      player.hp -= 0.5;

      if(player.hp <= 0){
        alert("Byl jsi zatčen!");
        location.reload();
      }
    }
  });

  // UI
  document.getElementById("scrap").innerText = player.scrap;
  document.getElementById("money").innerText = player.money;
  document.getElementById("hp").innerText = Math.floor(player.hp);

  // MINIMAPA
  ctx.clearRect(0,0,150,150);
  let scale = 150/300;

  // hráč
  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(75 + camera.position.x*scale, 75 + camera.position.z*scale, 4,0,Math.PI*2);
  ctx.fill();

  // policie
  ctx.fillStyle="blue";
  police.forEach(p=>{
    ctx.beginPath();
    ctx.arc(75 + p.position.x*scale, 75 + p.position.z*scale, 3,0,Math.PI*2);
    ctx.fill();
  });
}

// LOOP
function animate(){
  requestAnimationFrame(animate);
  update();
  renderer.render(scene, camera);
}
animate();

</script>
</body>
</html>
