<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Hylváty Heist – Ultra Realistická Verze (FULL FIXED)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
body{margin:0;overflow:hidden;background:#000}
canvas{display:block}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
'use strict';

// CONFIG
const CFG={
  TIME:150,
  WALK:5.5,
  SPRINT:10.5,
  H:1.78
};

// STATE
let scene,camera,renderer;
let keys={},yaw=0,pitch=0;
let playerPos=new THREE.Vector3(2,CFG.H,2);
let clock=new THREE.Clock();

// AUDIO FIX
let audioCtx=null;
function initAudio(){
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  }catch(e){
    console.warn("Audio nepodporováno");
  }
}

// INIT
function init(){
  const canvas=document.getElementById('canvas');

  renderer=new THREE.WebGLRenderer({canvas,antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x0d0e18);

  camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,200);
  camera.position.copy(playerPos);

  const light=new THREE.DirectionalLight(0xffffff,1);
  light.position.set(10,20,10);
  scene.add(light);

  const amb=new THREE.AmbientLight(0x404040);
  scene.add(amb);

  // GROUND
  const ground=new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshStandardMaterial({color:0x222222})
  );
  ground.rotation.x=-Math.PI/2;
  scene.add(ground);

  // TEST OBJEKTY (železo)
  for(let i=0;i<20;i++){
    const box=new THREE.Mesh(
      new THREE.BoxGeometry(1,1,1),
      new THREE.MeshStandardMaterial({color:0xff6a00})
    );
    box.position.set((Math.random()-0.5)*50,0.5,(Math.random()-0.5)*50);
    scene.add(box);
  }

  // VOZIDLA (OPRAVA MINUSU)
  const vehicles = [
    [20,0,-16,0x334455],
    [-15,0,-26,0x553322],
    [5,0,-36,0x224433],
    [-30,0,20,0x443322]
  ];

  vehicles.forEach(v=>{
    const car=new THREE.Mesh(
      new THREE.BoxGeometry(2,1,4),
      new THREE.MeshStandardMaterial({color:v[3]})
    );
    car.position.set(v[0],0.5,v[2]);
    scene.add(car);
  });

  setupInput();
  animate();
}

// INPUT
function setupInput(){
  document.addEventListener('keydown',e=>keys[e.code]=true);
  document.addEventListener('keyup',e=>keys[e.code]=false);

  document.addEventListener('mousemove',e=>{
    yaw -= e.movementX*0.002;
    pitch -= e.movementY*0.002;
    pitch=Math.max(-1.5,Math.min(1.5,pitch));
  });

  document.body.addEventListener('click',()=>{
    document.body.requestPointerLock();
  });
}

// UPDATE
function update(){
  const dt=Math.min(clock.getDelta(),0.05);

  const speed=(keys["ShiftLeft"]?CFG.SPRINT:CFG.WALK)*dt;

  let dir=new THREE.Vector3();

  if(keys["KeyW"])dir.z-=1;
  if(keys["KeyS"])dir.z+=1;
  if(keys["KeyA"])dir.x-=1;
  if(keys["KeyD"])dir.x+=1;

  if(dir.length()>0){
    dir.normalize();
    dir.applyEuler(new THREE.Euler(0,yaw,0));
    playerPos.add(dir.multiplyScalar(speed));
  }

  camera.position.copy(playerPos);
  camera.rotation.order="YXZ";
  camera.rotation.y=yaw;
  camera.rotation.x=pitch;
}

// LOOP
function animate(){
  requestAnimationFrame(animate);
  update();
  renderer.render(scene,camera);
}

// START
window.addEventListener('load',()=>{
  initAudio();
  init();
});
</script>

</body>
</html>
