<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Hylváty Heist 3.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
body{margin:0;overflow:hidden;background:#000;font-family:sans-serif}
#hud{position:fixed;top:10px;left:10px;color:white}
#msg{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#ff6a00}
</style>
</head>
<body>

<div id="hud">
Batoh: <span id="c">0</span><br>
Odvezeno: <span id="t">0</span><br>
Heat: <span id="h">0</span>%<br>
Stamina: <span id="s">100</span>%<br>
Čas: <span id="ti">150</span>
</div>

<div id="msg"></div>

<canvas id="game"></canvas>

<script>
const CFG={TIME:150,WALK:5,SPRINT:9,MAX:40};

let scene,camera,renderer,clock;
let player=new THREE.Vector3(0,1.8,5);
let yaw=0,pitch=0,keys={};

let carry=0,total=0,heat=0,stam=100,timeLeft=CFG.TIME;

let iron=[],police;

// INIT
function init(){
 renderer=new THREE.WebGLRenderer({canvas:game,antialias:true});
 renderer.setSize(innerWidth,innerHeight);

 scene=new THREE.Scene();
 scene.background=new THREE.Color(0x111122);

 camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,200);
 camera.position.copy(player);

 clock=new THREE.Clock();

 scene.add(new THREE.AmbientLight(0xffffff,0.5));
 let l=new THREE.DirectionalLight(0xffffff,1);
 l.position.set(10,20,10);
 scene.add(l);

 let g=new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x222222})
 );
 g.rotation.x=-Math.PI/2;
 scene.add(g);

 spawnIron();

 let van=new THREE.Mesh(
  new THREE.BoxGeometry(3,2,5),
  new THREE.MeshStandardMaterial({color:0x44ff88})
 );
 van.position.set(0,1,0);
 van.name="van";
 scene.add(van);

 police=new THREE.Mesh(
  new THREE.BoxGeometry(1,2,1),
  new THREE.MeshStandardMaterial({color:0x4444ff})
 );
 police.position.set(10,1,10);
 scene.add(police);

 input();
 timer();
 loop();
}

// SPAWN
function spawnIron(){
 for(let i=0;i<30;i++){
  let b=new THREE.Mesh(
   new THREE.BoxGeometry(1,1,1),
   new THREE.MeshStandardMaterial({color:0xff6a00})
  );
  b.position.set(rand(-60,60),0.5,rand(-60,60));
  scene.add(b);
  iron.push(b);
 }
}

// INPUT
function input(){
 onkeydown=e=>{keys[e.code]=true;if(e.code==="KeyE")interact();};
 onkeyup=e=>keys[e.code]=false;
 onmousemove=e=>{
  if(document.pointerLockElement){
   yaw-=e.movementX*0.002;
   pitch=clamp(pitch-e.movementY*0.002,-1.5,1.5);
  }
 };
 onclick=()=>document.body.requestPointerLock();
}

// INTERACT
function interact(){
 for(let o of iron){
  if(o.visible && dist(o.position,player)<2){
   if(carry>=CFG.MAX){msg("Plný batoh");return;}
   o.visible=false;
   carry+=5;
   heat+=10;
   return;
  }
 }

 let van=scene.getObjectByName("van");
 if(dist(van.position,player)<4){
  total+=carry;
  carry=0;
  msg("Naloženo!");
 }
}

// TIMER
function timer(){
 setInterval(()=>{
  if(timeLeft<=0)return;
  timeLeft--;
  if(timeLeft===0) end("Konec! "+total+" kg");
 },1000);
}

// UPDATE
function update(){
 let dt=Math.min(clock.getDelta(),0.05);

 let sprint=keys["ShiftLeft"]&&stam>0;
 let speed=(sprint?CFG.SPRINT:CFG.WALK)*dt;

 stam=clamp(stam+(sprint?-30:20)*dt,0,100);

 let dir=new THREE.Vector3();
 if(keys["KeyW"])dir.z--;
 if(keys["KeyS"])dir.z++;
 if(keys["KeyA"])dir.x--;
 if(keys["KeyD"])dir.x++;

 if(dir.length()>0){
  dir.normalize().applyEuler(new THREE.Euler(0,yaw,0));
  player.add(dir.multiplyScalar(speed));
 }

 // POLICE
 if(heat>50){
  let d=player.clone().sub(police.position);
  let distLen=d.length();
  if(distLen>0){
    d.normalize();
    police.position.add(d.multiplyScalar(4*dt));
  }
  if(distLen<1.5) end("Chycen policií!");
 }

 heat=clamp(heat-5*dt,0,100);

 camera.position.copy(player);
 camera.rotation.order="YXZ";
 camera.rotation.y=yaw;
 camera.rotation.x=pitch;

 hud();
}

// HUD
function hud(){
 c.textContent=carry;
 t.textContent=total;
 h.textContent=Math.floor(heat);
 s.textContent=Math.floor(stam);
 ti.textContent=timeLeft;
}

// LOOP
function loop(){
 requestAnimationFrame(loop);
 update();
 renderer.render(scene,camera);
}

// UTILS
function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
function rand(a,b){return Math.random()*(b-a)+a;}
function dist(a,b){return a.distanceTo(b);}

// MSG
let msgTO;
function msg(t){
 msgEl.textContent=t;
 clearTimeout(msgTO);
 msgTO=setTimeout(()=>msgEl.textContent="",2000);
}

// END
function end(t){
 msg(t);
 setTimeout(()=>location.reload(),2000);
}

// START
init();
</script>
</body>
</html>
