<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TURBO ŽELEZO: HYLVÁTY 300m</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #000; }
        
        #menu, #shop {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; text-align: center;
        }
        #shop { display: none; }
        h1 { color: #ff6600; text-shadow: 0 0 20px #ff6600; font-size: 3em; margin-bottom: 10px; }
        button { 
            background: #ff6600; color: white; border: none; padding: 15px 40px; 
            font-size: 1.2em; border-radius: 50px; cursor: pointer; margin: 10px; 
            font-weight: bold; transition: 0.2s;
        }
        button:hover { transform: scale(1.05); background: #ff8800; }

        #gameUI { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        #stats { 
            position: absolute; top: 20px; left: 20px; color: white; 
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; 
            border-left: 5px solid #00d4ff;
        }
        #minimapContainer { 
            position: fixed; bottom: 20px; right: 20px; width: 160px; height: 160px; 
            background: rgba(0,0,0,0.8); border: 2px solid #555; border-radius: 10px; overflow: hidden; 
        }
        #minimap { width: 100%; height: 100%; }
        #crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #00ff00; font-size: 24px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>🔩 HYLVÁTY 300m 🔩</h1>
        <p>Mapa 300x300m. Země: podlaha.jpg. Najdi shop (F)!</p>
        <button onclick="startGame()">START</button>
    </div>

    <div id="shop">
        <h1>OBCHODNÍ CENTRUM</h1>
        <p>Peníze: <span id="moneyUI_shop">0</span> Kč</p>
        <button onclick="buyBackpack()">VĚTŠÍ BATOH (kapacita 100) - 500 Kč</button>
        <button onclick="closeShop()">ZAVŘÍT (ESC)</button>
    </div>

    <div id="gameUI">
        <div id="stats">
            ŽELEZO: <span id="ironCountUI">0</span> / <span id="capacityUI">50</span><br>
            PENÍZE: <span id="moneyUI_game">0</span> Kč<br>
            HP: <span id="healthUI">100</span>%
        </div>
        <div id="crosshair">+</div>
        <div id="minimapContainer"><canvas id="minimap" width="160" height="160"></canvas></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, controls;
        let irons = [], police = [], buildingBoxes = [], ironCount = 0, money = 0, health = 100, capacity = 50;
        let keys = { w:false, s:false, a:false, d:false };
        let shopOpen = false;

        const MAP_SIZE = 300; 
        const groundTexturePath = 'podlaha.jpg'; // Nastaveno na tvůj soubor
        const policeModelPath = 'model.glb';

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('gameUI').style.display = 'block';
            init();
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020205);
            scene.fog = new THREE.Fog(0x020205, 10, 180);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 500);
            renderer = new THREE.WebGLRenderer({antialias: true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.PointerLockControls(camera, renderer.domElement);
            controls.getObject().position.set(0, 1.7, 0);
            scene.add(controls.getObject());

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            // ZEMĚ (300x300) s texturou podlaha.jpg
            const texLoader = new THREE.TextureLoader();
            const groundTex = texLoader.load(groundTexturePath);
            groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping;
            groundTex.repeat.set(20, 20); // Hustota opakování textury
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE), new THREE.MeshStandardMaterial({map: groundTex}));
            ground.rotation.x = -Math.PI/2;
            scene.add(ground);

            // HRANICE MAPY (Neviditelné zdi)
            const wallMat = new THREE.MeshBasicMaterial({visible: false});
            const createWall = (w, h, d, x, z) => {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
                wall.position.set(x, h/2, z);
                scene.add(wall);
                buildingBoxes.push(new THREE.Box3().setFromObject(wall));
            };
            createWall(MAP_SIZE, 50, 1, 0, MAP_SIZE/2);  
            createWall(MAP_SIZE, 50, 1, 0, -MAP_SIZE/2); 
            createWall(1, 50, MAP_SIZE, MAP_SIZE/2, 0);  
            createWall(1, 50, MAP_SIZE, -MAP_SIZE/2, 0); 

            // MĚSTO (40 budov v prostoru 300x300)
            for(let i=0; i<40; i++) {
                const h = 10 + Math.random()*30;
                const b = new THREE.Mesh(new THREE.BoxGeometry(20, h, 20), new THREE.MeshStandardMaterial({color: 0x1a1a1c}));
                b.position.set((Math.random()-0.5)*(MAP_SIZE-40), h/2, (Math.random()-0.5)*(MAP_SIZE-40));
                scene.add(b);
                buildingBoxes.push(new THREE.Box3().setFromObject(b));
            }

            // ŽELEZO
            for(let i=0; i<40; i++) {
                const iron = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.2), new THREE.MeshStandardMaterial({color: 0xffaa00}));
                iron.position.set((Math.random()-0.5)*(MAP_SIZE-20), 0.5, (Math.random()-0.5)*(MAP_SIZE-20));
                scene.add(iron);
                irons.push(iron);
            }

            // 3 POLICISTÉ
            const gltfLoader = new THREE.GLTFLoader();
            for(let i=0; i<3; i++) {
                gltfLoader.load(policeModelPath, (gltf) => {
                    const p = gltf.scene;
                    p.scale.set(1.5, 1.5, 1.5);
                    const group = new THREE.Group();
                    group.add(p);
                    group.position.set((Math.random()-0.5)*200, 0, (Math.random()-0.5)*200);
                    scene.add(group);
                    police.push(group);
                }, undefined, () => {
                    const group = new THREE.Group();
                    group.add(new THREE.Mesh(new THREE.BoxGeometry(1.5, 3, 1.5), new THREE.MeshStandardMaterial({color: 0x0055ff})));
                    group.position.set((Math.random()-0.5)*200, 1.5, (Math.random()-0.5)*200);
                    scene.add(group);
                    police.push(group);
                });
            }

            setupInput();
            animate();
        }

        function setupInput() {
            document.addEventListener('keydown', (e) => {
                if (e.code === 'KeyW') keys.w = true;
                if (e.code === 'KeyS') keys.s = true;
                if (e.code === 'KeyA') keys.a = true;
                if (e.code === 'KeyD') keys.d = true;
                if (e.code === 'KeyE') collectIron();
                if (e.code === 'KeyF') toggleShop();
                if (e.code === 'Escape' && shopOpen) closeShop();
            });
            document.addEventListener('keyup', (e) => {
                if (e.code === 'KeyW') keys.w = false;
                if (e.code === 'KeyS') keys.s = false;
                if (e.code === 'KeyA') keys.a = false;
                if (e.code === 'KeyD') keys.d = false;
            });
            renderer.domElement.addEventListener('click', () => { if(!shopOpen) controls.lock(); });
        }

        function collectIron() {
            const pPos = controls.getObject().position;
            for(let i=irons.length-1; i>=0; i--) {
                if(irons[i].position.distanceTo(pPos) < 5 && ironCount < capacity) {
                    scene.remove(irons[i]);
                    irons.splice(i, 1);
                    ironCount++;
                    money += 20;
                    updateUI();
                }
            }
        }

        function toggleShop() {
            shopOpen = true;
            controls.unlock();
            document.getElementById('shop').style.display = 'flex';
        }

        function closeShop() {
            shopOpen = false;
            document.getElementById('shop').style.display = 'none';
            controls.lock();
        }

        function buyBackpack() {
            if (money >= 500) {
                money -= 500;
                capacity = 100;
                updateUI();
                alert("Batoh vylepšen na 100 kusů!");
            }
        }

        function updateUI() {
            document.getElementById('ironCountUI').textContent = ironCount;
            document.getElementById('capacityUI').textContent = capacity;
            document.getElementById('moneyUI_game').textContent = money;
            document.getElementById('moneyUI_shop').textContent = money;
        }

        function drawMinimap() {
            const canvas = document.getElementById('minimap');
            const ctx = canvas.getContext('2d');
            const pPos = controls.getObject().position;
            
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            const angle = Math.atan2(dir.x, dir.z);

            ctx.clearRect(0,0,160,160);
            
            ctx.fillStyle = "rgba(255, 255, 255, 0.25)";
            ctx.beginPath();
            ctx.moveTo(80, 80);
            ctx.arc(80, 80, 40, angle - 0.6, angle + 0.6);
            ctx.fill();

            ctx.fillStyle = "red";
            ctx.beginPath(); ctx.arc(80, 80, 4, 0, Math.PI*2); ctx.fill();

            ctx.fillStyle = "#00d4ff";
            police.forEach(p => {
                let dx = (p.position.x - pPos.x) / (MAP_SIZE/160) + 80;
                let dz = (p.position.z - pPos.z) / (MAP_SIZE/160) + 80;
                if (dx > 0 && dx < 160 && dz > 0 && dz < 160) {
                    ctx.beginPath(); ctx.arc(dx, dz, 3, 0, Math.PI*2); ctx.fill();
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            if(!controls.isLocked || shopOpen) return;

            const oldPos = controls.getObject().position.clone();
            if (keys.w) controls.moveForward(0.6);
            if (keys.s) controls.moveForward(-0.6);
            if (keys.a) controls.moveRight(-0.6);
            if (keys.d) controls.moveRight(0.6);

            const pBox = new THREE.Box3().setFromCenterAndSize(controls.getObject().position, new THREE.Vector3(1, 2, 1));
            for(let box of buildingBoxes) {
                if(pBox.intersectsBox(box)) controls.getObject().position.copy(oldPos);
            }

            police.forEach(p => {
                const dist = p.position.distanceTo(controls.getObject().position);
                if(dist < 100) {
                    p.lookAt(controls.getObject().position.x, 0, controls.getObject().position.z);
                    const dir = new THREE.Vector3().subVectors(controls.getObject().position, p.position).normalize();
                    p.position.add(dir.multiplyScalar(0.35));
                    
                    if(p.children[0]) p.children[0].position.y = Math.abs(Math.sin(Date.now()*0.01)) * 0.1;

                    if(dist < 3) {
                        health -= 0.4;
                        document.getElementById('healthUI').textContent = Math.floor(health);
                        if(health <= 0) { alert("Zatčen!"); location.reload(); }
                    }
                }
            });

            drawMinimap();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
