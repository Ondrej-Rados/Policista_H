<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>3D Survival Game</title>
<style>
body { margin: 0; overflow: hidden; font-family: Arial; background: black; }
#ui {
  position: absolute; top: 10px; left: 10px; color: white;
}
#minimap {
  position: absolute; bottom: 10px; right: 10px;
  width: 150px; height: 150px; border-radius: 50%;
  background: rgba(0,0,0,0.5);
}
#shop {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: black; color: white;
  padding: 20px; display: none;
}
</style>
</head>
<body>

<div id="ui">
  Scrap: <span id="scrap">0</span><br>
  Money: <span id="money">0</span> CZK<br>
  HP: <span id="hp">100</span>
</div>

<canvas id="minimap"></canvas>

<div id="shop">
  <h2>Shop</h2>
  <button onclick="buyUpgrade()">Backpack (500 CZK)</button>
  <br><br>
  <button onclick="closeShop()">Close</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/controls/PointerLockControls.js"></script>

<script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);
scene.fog = new THREE.FogExp2(0x000000, 0.03);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.PointerLockControls(camera, document.body);
document.body.onclick = () => controls.lock();

scene.add(controls.getObject());

camera.position.y = 1.7;

// světlo
const light = new THREE.DirectionalLight(0xaaaaee, 0.5);
light.position.set(50,100,50);
scene.add(light);

// zem
const texture = new THREE.TextureLoader().load("podlaha.jpg");
texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
texture.repeat.set(50,50);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(300,300),
  new THREE.MeshStandardMaterial({ map: texture })
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// hráč
let player = {
  velocity: new THREE.Vector3(),
  speed: 0.1,
  scrap: 0,
  money: 0,
  hp: 100,
  capacity: 50
};

// pohyb
let keys = {};
document.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;

  if (e.key === "f") openShop();
  if (e.key === "e") collectScrap();
});

document.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
});

// budovy
let buildings = [];
for(let i=0;i<40;i++){
  const geo = new THREE.BoxGeometry(5, Math.random()*20+5, 5);
  const mat = new THREE.MeshStandardMaterial({ color: 0x333333 });
  const b = new THREE.Mesh(geo, mat);
  b.position.set(
    (Math.random()-0.5)*280,
    geo.parameters.height/2,
    (Math.random()-0.5)*280
  );
  scene.add(b);
  buildings.push(b);
}

// scrap
let scraps = [];
for(let i=0;i<50;i++){
  const s = new THREE.Mesh(
    new THREE.CylinderGeometry(0.5,0.5,1,8),
    new THREE.MeshBasicMaterial({ color: 0xffd700 })
  );
  s.position.set(
    (Math.random()-0.5)*280,
    0.5,
    (Math.random()-0.5)*280
  );
  scene.add(s);
  scraps.push(s);
}

// policie
let police = [];
for(let i=0;i<3;i++){
  const p = new THREE.Mesh(
    new THREE.BoxGeometry(2,3,2),
    new THREE.MeshBasicMaterial({ color: 0x0000ff })
  );
  p.position.set(
    (Math.random()-0.5)*200,
    1.5,
    (Math.random()-0.5)*200
  );
  scene.add(p);
  police.push(p);
}

// minimap
const minimap = document.getElementById("minimap");
const ctx = minimap.getContext("2d");

// shop
function openShop(){ document.getElementById("shop").style.display="block"; }
function closeShop(){ document.getElementById("shop").style.display="none"; }

function buyUpgrade(){
  if(player.money >= 500){
    player.money -= 500;
    player.capacity = 100;
  }
}

// sběr
function collectScrap(){
  scraps.forEach((s, i) => {
    if(s.position.distanceTo(camera.position) < 3){
      if(player.scrap < player.capacity){
        player.scrap++;
        player.money += Math.floor(Math.random()*6)+15;
        scene.remove(s);
        scraps.splice(i,1);
      }
    }
  });
}

// update
function update(){
  let dir = new THREE.Vector3();

  if(keys["w"]) dir.z -= 1;
  if(keys["s"]) dir.z += 1;
  if(keys["a"]) dir.x -= 1;
  if(keys["d"]) dir.x += 1;

  dir.normalize();

  controls.moveRight(dir.x * player.speed);
  controls.moveForward(dir.z * player.speed);

  // hranice mapy
  camera.position.x = Math.max(-150, Math.min(150, camera.position.x));
  camera.position.z = Math.max(-150, Math.min(150, camera.position.z));

  // policie AI
  police.forEach(p => {
    let dist = p.position.distanceTo(camera.position);
    if(dist < 100){
      let dir = camera.position.clone().sub(p.position).normalize();
      p.position.add(dir.multiplyScalar(0.05));
    }

    if(dist < 2){
      player.hp -= 0.5;
      if(player.hp <= 0){
        alert("Byl jsi zatčen!");
        location.reload();
      }
    }
  });

  // UI
  document.getElementById("scrap").innerText = player.scrap;
  document.getElementById("money").innerText = player.money;
  document.getElementById("hp").innerText = Math.floor(player.hp);

  // minimap
  ctx.clearRect(0,0,150,150);

  let scale = 150/300;

  // hráč
  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(
    75 + camera.position.x*scale,
    75 + camera.position.z*scale,
    4,0,Math.PI*2
  );
  ctx.fill();

  // policie
  ctx.fillStyle="blue";
  police.forEach(p=>{
    ctx.beginPath();
    ctx.arc(
      75 + p.position.x*scale,
      75 + p.position.z*scale,
      3,0,Math.PI*2
    );
    ctx.fill();
  });
}

// render loop
function animate(){
  requestAnimationFrame(animate);
  update();
  renderer.render(scene, camera);
}
animate();

</script>
</body>
</html>
