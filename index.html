<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Hylváty Heist – Funkční verze</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
body{margin:0;overflow:hidden;background:#000;font-family:sans-serif}
#hud{position:fixed;top:10px;left:10px;color:white;z-index:10}
</style>
</head>
<body>

<div id="hud">
  <div>Batoh: <span id="carry">0</span> kg</div>
  <div>Odvezeno: <span id="total">0</span> kg</div>
  <div>Čas: <span id="time">150</span>s</div>
</div>

<canvas id="canvas"></canvas>

<script>
'use strict';

// ===== CONFIG =====
const CFG = {
  TIME: 150,
  WALK: 5,
  SPRINT: 9,
  MAX_CARRY: 40
};

// ===== STATE =====
let scene, camera, renderer, clock;
let keys = {};
let yaw = 0, pitch = 0;
let player = new THREE.Vector3(0,1.8,5);

let carry = 0;
let total = 0;
let timeLeft = CFG.TIME;

let iron = [];

// ===== INIT =====
function init(){
  const canvas = document.getElementById("canvas");

  renderer = new THREE.WebGLRenderer({canvas, antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111122);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 200);
  camera.position.copy(player);

  clock = new THREE.Clock();

  // světlo
  scene.add(new THREE.AmbientLight(0xffffff,0.5));
  const light = new THREE.DirectionalLight(0xffffff,1);
  light.position.set(10,20,10);
  scene.add(light);

  // zem
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshStandardMaterial({color:0x222222})
  );
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  // budovy
  for(let i=0;i<20;i++){
    const b = new THREE.Mesh(
      new THREE.BoxGeometry(5,5+Math.random()*10,5),
      new THREE.MeshStandardMaterial({color:0x333344})
    );
    b.position.set((Math.random()-0.5)*80, b.scale.y/2, (Math.random()-0.5)*80);
    scene.add(b);
  }

  // železo
  for(let i=0;i<25;i++){
    const box = new THREE.Mesh(
      new THREE.BoxGeometry(1,1,1),
      new THREE.MeshStandardMaterial({color:0xff6a00})
    );
    box.position.set((Math.random()-0.5)*50,0.5,(Math.random()-0.5)*50);
    scene.add(box);
    iron.push(box);
  }

  // dodávka (cíl)
  const van = new THREE.Mesh(
    new THREE.BoxGeometry(3,2,5),
    new THREE.MeshStandardMaterial({color:0x44ff88})
  );
  van.position.set(0,1,0);
  van.name = "van";
  scene.add(van);

  setupInput();
  startTimer();
  animate();
}

// ===== INPUT =====
function setupInput(){
  document.addEventListener("keydown",e=>{
    keys[e.code]=true;

    if(e.code==="KeyE") interact();
  });

  document.addEventListener("keyup",e=>keys[e.code]=false);

  document.addEventListener("mousemove",e=>{
    if(document.pointerLockElement){
      yaw -= e.movementX*0.002;
      pitch -= e.movementY*0.002;
      pitch=Math.max(-1.5,Math.min(1.5,pitch));
    }
  });

  document.body.onclick = ()=> document.body.requestPointerLock();
}

// ===== INTERACT =====
function interact(){
  // sběr
  for(let i=0;i<iron.length;i++){
    const obj = iron[i];
    if(!obj.visible) continue;

    if(obj.position.distanceTo(player) < 2){
      if(carry + 5 > CFG.MAX_CARRY) return;

      obj.visible = false;
      carry += 5;
      updateHUD();
      return;
    }
  }

  // dodávka
  const van = scene.getObjectByName("van");
  if(van.position.distanceTo(player) < 4){
    total += carry;
    carry = 0;
    updateHUD();
  }
}

// ===== TIMER =====
function startTimer(){
  setInterval(()=>{
    timeLeft--;
    document.getElementById("time").textContent = timeLeft;

    if(timeLeft <= 0){
      alert("Konec hry! Odvezeno: "+total+" kg");
      location.reload();
    }
  },1000);
}

// ===== UPDATE =====
function update(){
  const dt = clock.getDelta();

  let speed = (keys["ShiftLeft"]?CFG.SPRINT:CFG.WALK) * dt;

  let dir = new THREE.Vector3();

  if(keys["KeyW"]) dir.z -= 1;
  if(keys["KeyS"]) dir.z += 1;
  if(keys["KeyA"]) dir.x -= 1;
  if(keys["KeyD"]) dir.x += 1;

  if(dir.length()>0){
    dir.normalize();
    dir.applyEuler(new THREE.Euler(0,yaw,0));
    player.add(dir.multiplyScalar(speed));
  }

  camera.position.copy(player);
  camera.rotation.order="YXZ";
  camera.rotation.y=yaw;
  camera.rotation.x=pitch;
}

// ===== HUD =====
function updateHUD(){
  document.getElementById("carry").textContent = carry;
  document.getElementById("total").textContent = total;
}

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);
  update();
  renderer.render(scene,camera);
}

// START
window.onload = init;
</script>

</body>
</html>
